[pytest]
markers =
    unit: marks unit tests
# Scoped to tests/ on purpose: unscoped collection also picks up bundled
# skill packages under skills/ that ship their own test files with their
# own import-path assumptions (e.g. skill-comply's tests import
# `scripts.parser` relative to that skill's own directory, not the repo
# root), which fail to collect when pytest runs from the repo root.
testpaths =
    tests
