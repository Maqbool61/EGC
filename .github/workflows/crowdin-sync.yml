name: Crowdin Sync

on:
  push:
    branches:
      - main
    paths:
      - README.md
  workflow_dispatch:

permissions: {}

jobs:
  synchronize-with-crowdin:
    name: Sync translations
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Crowdin sync
        uses: crowdin/github-action@52aa776766211d83d975df51f3b9c53c2f8ba35f # v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          create_pull_request: true
          pull_request_title: "chore: update translations from Crowdin"
          pull_request_body: "New translations synced from [Crowdin](https://crowdin.com/project/egc)."
          pull_request_base_branch_name: main
          localization_branch_name: chore/crowdin-translations
          skip_untranslated_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
