name: Update README Language Selector

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  update-selector:
    name: Sync language selector
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Update language selector
        run: node scripts/update-readme-languages.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            MSG=$'chore(i18n): sync language selector in README\n\nSigned-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
            git commit -m "$MSG"
            git push
          fi
